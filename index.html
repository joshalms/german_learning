  c.append(opts);

  if(FS.quizAnswered){
    const ok=FS.quizChoice===q.ans;
    const fb=div('feedback '+(ok?'fb-ok':'fb-err'));
    fb.textContent=ok?'✓ Correct!':'✗ The correct answer is: '+q.opts[q.ans];
    c.append(fb);
    const nb=btn('btn-primary btn-full','Next →',()=>{FS.quizIdx++;FS.quizAnswered=false;FS.quizChoice=null;frRender()});
    nb.style.marginTop='14px';c.append(nb);
  }

  return nodes(hdr,c);
}

// ── French Vocabulary Learn ───────────────────────────────────────────────────
function renderFrLearn(){
  const cc=FS.currentCard;
  if(!cc)return[];

  const total=FS.learnBatch.length;
  const done=FS.learnMastered.length;

  // Header with pipeline status pills
  const hdr=div('card card-sm');
  const topRow=div('page-hdr');
  topRow.append(
    el('button',{cls:'back',onclick:frGoHome},'←'),
    el('h2',{},'Learn: '+FS.learnTopic),
    el('span',{style:'font-size:13px;color:var(--muted);margin-left:auto'},`✓ ${done}/${total}`)
  );
  const pipeRow=div('');
  pipeRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)';
  const pip=(icon,n,bg,fg)=>{const c=div('');c.style.cssText=`font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px;background:${bg};color:${fg}`;c.textContent=`${icon} ${n}`;return c;};
  if(FS.studyQ.length>0) pipeRow.append(pip('📚',FS.studyQ.length,'var(--bg)','var(--muted)'));
  if(FS.mcQ.length>0)    pipeRow.append(pip('⚡',FS.mcQ.length,'var(--warnl)','var(--warn)'));
  if(FS.typeQ.length>0)  pipeRow.append(pip('✍️',FS.typeQ.length,'var(--hardl)','var(--hard)'));
  if(done>0)             pipeRow.append(pip('✓',done,'var(--okl)','var(--ok)'));
  hdr.append(topRow,pipeRow);

  const pb=div('prog-bar');
  const pf=div('prog-fill');pf.style.width=(done/total*100)+'%';pb.append(pf);

  const w=cc.word;
  let cardEl;
  if(cc.stage==='study')     cardEl=renderFrStudyCard(w);
  else if(cc.stage==='mc')   cardEl=renderFrMCCard(w);
  else                        cardEl=renderFrLearnTypeCard(w);

  return nodes(hdr,pb,cardEl);
}

// ── French study card ─────────────────────────────────────────────────────────
function renderFrStudyCard(w){
  const c=div('fr-card');
  const badge=div('cat-badge');badge.textContent=w.c;c.append(badge);
  c.append(el('div',{cls:'label'},'New Word — study it, then you\'ll be tested shortly'));
  const box=div('fr-study-box');
  const wEl=div('fr-word');wEl.textContent=w.f;
  const pEl=div('fr-phon');pEl.textContent='['+w.p+']';
  const srow=div('speak-row');
  const sbtn=speakBtnFr(w.f);sbtn.classList.add('speak-btn-lg');
  srow.append(sbtn,el('span',{style:'font-size:13px;color:var(--muted)'},'Listen'));
  const eEl=div('fr-en');eEl.textContent=w.e;
  box.append(wEl,pEl,srow,eEl);
  if(w.tip){const t=div('fr-tip');t.textContent='💡 '+w.tip;box.append(t);}
  c.append(box);
  const goBtn=btn('btn-primary btn-full','Got it →',()=>advanceFrLearn(()=>FS.mcQ.push(w)));
  goBtn.style.marginTop='16px';c.append(goBtn);
  setTimeout(()=>speakFr(w.f),350);
  return c;
}

// ── French MC card ────────────────────────────────────────────────────────────
function renderFrMCCard(w){
  if(!FS.mcDone&&!FS.mcOpts.length){
    FS.mcOpts=shuffle([w.f,...frDistractors(w,3)]);
  }
  const c=div('fr-card');
  const badge=div('cat-badge');badge.textContent=w.c;c.append(badge);
  c.append(el('div',{cls:'label'},'Multiple choice — you studied this recently'));
  c.append(el('div',{cls:'prompt-en'},w.e));

  const grid=div('mc-grid');
  for(const opt of FS.mcOpts){
    const isOk=opt===w.f;
    const cls='mc-opt'+(FS.mcDone?' mc-locked':'')
      +(FS.mcDone&&isOk?' mc-correct':'')
      +(FS.mcDone&&!isOk&&FS.lastChosen===opt?' mc-wrong':'');
    const ob=el('button',{cls,type:'button'},opt);
    if(!FS.mcDone)ob.addEventListener('click',()=>{FS.mcDone=true;FS.mcOk=isOk;FS.lastChosen=opt;frRender()});
    grid.append(ob);
  }
  c.append(grid);

  if(FS.mcDone){
    const resetMC=()=>{FS.mcOpts=[];FS.mcDone=false;FS.mcOk=null;FS.lastChosen=null};
    if(FS.mcOk){
      const fb=div('feedback fb-ok');fb.append('✓ Correct! ',speakBtnFr(w.f));c.append(fb);
      speakFr(w.f);
      const nb=btn('btn-ok btn-full','Next →',()=>advanceFrLearn(()=>{resetMC();FS.typeQ.push(w);FS.stats.correct++}));
      nb.style.marginTop='14px';c.append(nb);
    } else {
      const fb=div('feedback fb-err');fb.append('✗ Correct: ',el('strong',{},w.f),' ',speakBtnFr(w.f));c.append(fb);
      speakFr(w.f);
      const nb=btn('btn-ghost btn-full','Next →',()=>advanceFrLearn(()=>{resetMC();FS.mcQ.push(w);FS.stats.wrong++}));
      nb.style.marginTop='14px';c.append(nb);
    }
  }
  return c;
}

// ── French learn type card ────────────────────────────────────────────────────
function renderFrLearnTypeCard(w){
  return buildFrTypeCard(w,{
    onCorrect:()=>advanceFrLearn(()=>{FS.learnMastered.push(w);FS.stats.correct++}),
    onWrong:()=>advanceFrLearn(()=>{FS.typeQ.push(w);FS.stats.wrong++}),
    markMistake:()=>{frCard(w.id).lastWrong=today();frSave()},
    trackSRS:false,
  });
}

// ── French Review ─────────────────────────────────────────────────────────────
function renderFrReview(){
  if(FS.qIdx>=FS.queue.length){
    if(FS.wrongQ.length>0&&!FS.retrying){
      FS.queue=shuffle(FS.wrongQ);FS.qIdx=0;FS.wrongQ=[];FS.retrying=true;frRender();return[];
    }
    FS.screen='fsummary';FS.stats.learned=0;frRender();return[];
  }

  const w=FS.queue[FS.qIdx];
  const titleMap={today:"Today's Words",due:'Due Review',all:'All Words Review',
    topic:FS.topicFilter||'Topic Review',difficult:'Difficult Words',
    comprehensive:(FS.topicFilter||'Topic')+' — Mastery Review'};
  const title=titleMap[FS.rtype]||'French Review';
  const backFn=(FS.rtype==='topic'||FS.rtype==='comprehensive')?()=>{FS.screen='ftopics';frRender()}:frGoHome;

  const hdr=div('page-hdr card card-sm');
  hdr.append(
    el('button',{cls:'back',onclick:backFn},'←'),
    el('h2',{},title),
    el('span',{style:'font-size:13px;color:var(--muted);margin-left:auto'},FS.qIdx+'/'+FS.queue.length)
  );
  const pb=div('prog-bar');
  pb.innerHTML=`<div class="prog-fill" style="width:${(FS.queue.length?(FS.qIdx/FS.queue.length*100):0)}%"></div>`;

  const isSRSReview=FS.rtype==='due'||FS.rtype==='difficult'||FS.rtype==='comprehensive';
  const cardEl=buildFrTypeCard(w,{
    onCorrect:(q)=>{
      if(isSRSReview){
        const fc=frCard(w.id);
        frSM2(fc,q||2);
        if((FS.rtype==='difficult'||FS.rtype==='comprehensive')&&(q||2)>=2)fc.lastWrong=null;
        frSave();
      }
      FS.qIdx++;frRender();
    },
    onWrong:()=>{
      if(isSRSReview){const fc=frCard(w.id);frSM2(fc,0);frSave();}
      FS.wrongQ.push(w);FS.qIdx++;frRender();
    },
    markMistake:()=>{
      // Mark a near-miss for 'today' (no SRS update) and 'comprehensive' (tracked but not reset)
      if(FS.rtype==='today'||FS.rtype==='comprehensive'){
        frCard(w.id).lastWrong=today();frSave();
      }
    },
    trackSRS:isSRSReview,
    retryBanner:FS.retrying?'Retry — words you missed earlier':null,
  });

  return nodes(hdr,pb,cardEl);
}

// ── French Summary ────────────────────────────────────────────────────────────
// ── French Topic Select ───────────────────────────────────────────────────────
function renderFrTopicSelect(){
  const hdr=div('page-hdr card card-sm');
  hdr.append(el('button',{cls:'back',onclick:frGoHome},'←'),el('h2',{},'Review by Topic'));

  const topics=frTopics();
  const items=[];
  for(const [topic,info] of topics){
    const pct=info.total>0?Math.round(info.done/info.total*100):0;
    const item=div('topic-item'+(info.done===0?' dim':''));
    const iconDiv=div('topic-count');iconDiv.innerHTML=`${info.done}<sub>/ ${info.total}</sub>`;
    const infoDiv=div('topic-info');
    const nameDiv=div('topic-name');nameDiv.textContent=topic;
    const meta=div('topic-meta');meta.textContent=info.done+' words introduced · '+pct+'% complete';
    const progBar=div('topic-prog');progBar.innerHTML=`<div class="topic-prog-fill" style="width:${pct}%"></div>`;
    infoDiv.append(nameDiv,meta,progBar);
    item.append(infoDiv,iconDiv);
    if(info.done>0)item.onclick=()=>startFrReview('topic',topic);
    items.push(item);
  }

  const listCard=div('card');listCard.style.padding='8px 16px';
  listCard.style.display='flex';listCard.style.flexDirection='column';listCard.style.gap='6px';
  listCard.append(...items);
  return nodes(hdr,listCard);
}

// ── French Word List ──────────────────────────────────────────────────────────
function renderFrWordList(){
  // Topic overview or topic detail
  if(FS.wordlistTopic){
    return renderFrWordListDetail(FS.wordlistTopic);
  }

  const hdr=div('page-hdr card card-sm');
  hdr.append(
    el('button',{cls:'back',onclick:frGoHome},'←'),
    el('h2',{},'Word List'),
    el('span',{style:'font-size:13px;color:var(--muted);margin-left:auto'},FR_WORDS.length+' words')
  );

  const topics=frTopics();
  const items=[];
  for(const [topic,info] of topics){
    const pct=info.total>0?Math.round(info.done/info.total*100):0;
    const item=div('topic-item');
    const iconDiv=div('topic-count');iconDiv.innerHTML=`${info.done}<sub>/ ${info.total}</sub>`;
    const infoDiv=div('topic-info');
    const nameDiv=div('topic-name');nameDiv.textContent=topic;
    const meta=div('topic-meta');meta.textContent=info.done===info.total?'✓ Complete':pct+'% introduced';
    const progBar=div('topic-prog');progBar.innerHTML=`<div class="topic-prog-fill" style="width:${pct}%"></div>`;
    infoDiv.append(nameDiv,meta,progBar);
    item.append(infoDiv,iconDiv);
    item.onclick=()=>{FS.wordlistTopic=topic;frRender()};
    items.push(item);
  }

  const listCard=div('card');listCard.style.padding='8px 16px';
  listCard.style.display='flex';listCard.style.flexDirection='column';listCard.style.gap='6px';
  listCard.append(...items);
  return nodes(hdr,listCard);
}

function renderFrWordListDetail(topic){
  const words=FR_WORDS.filter(w=>w.c===topic);
  const introduced=words.filter(w=>frCard(w.id).introduced).length;

  const hdr=div('page-hdr card card-sm');
  hdr.append(
    el('button',{cls:'back',onclick:()=>{FS.wordlistTopic=null;frRender()}},'←'),
    el('h2',{},topic),
    el('span',{style:'font-size:13px;color:var(--muted);margin-left:auto'},introduced+'/'+words.length)
  );

  // Review button if any introduced
  const acts=[];
  if(introduced>0){
    const rb=btn('btn-primary btn-full','Review this topic ('+introduced+' words)',()=>startFrReview('topic',topic));
    acts.push(rb);
  }

  const listCard=div('list-card');
  words.forEach((w,i)=>{
    const c=frCard(w.id);
    const item=div('wl-item');
    const idx=div('wl-idx');idx.textContent=i+1;
    const body=div('wl-body');
    const deEl=div('wl-de');deEl.style.color='#c92a2a';deEl.textContent=w.f;
    const enEl=div('wl-en');enEl.textContent=w.e;
    const phEl=div('wl-meta');phEl.textContent='['+w.p+']';
    body.append(deEl,enEl,phEl);
    const right=div('wl-right');
    if(c.introduced){
      right.innerHTML=`<span style="color:var(--ok);font-weight:700;font-size:12px">✓ learned</span>`;
      if(c.interval)right.innerHTML+=`<br><span class="wl-interval">${c.interval}d</span>`;
    } else {
      right.innerHTML='<span style="color:var(--muted);font-size:12px">new</span>';
    }
    const sb=speakBtnFr(w.f);
    item.append(idx,body,sb,right);
    listCard.append(item);
  });

  return nodes(hdr,...acts,listCard);
}

function renderFrSummary(){
  const c=div('fr-card');c.style.textAlign='center';
  c.innerHTML=`<div style="font-size:48px">${FS.stats.learned>0?'🎉':'✨'}</div><h2 style="margin:10px 0 18px">Session Complete</h2>`;
  const addRow=(l,v)=>{const r=div('sum-row');r.innerHTML=`<span>${l}</span><strong>${v}</strong>`;c.append(r)};
  if(FS.stats.learned)addRow('Words introduced',FS.stats.learned);
  const tot=FS.stats.correct+FS.stats.wrong;
  if(tot){addRow('Correct',FS.stats.correct);addRow('Wrong',FS.stats.wrong);addRow('Accuracy',Math.round(FS.stats.correct/tot*100)+'%');}
  addRow('Total learned',frTotalIntroduced()+' / '+FR_WORDS.length);
  const hb=btn('btn-primary btn-full','← Home',frGoHome);hb.style.marginTop='18px';c.append(hb);
  const elems=[c];
  if(FS.completedTopicsQueue&&FS.completedTopicsQueue.length>0){
    for(const topic of FS.completedTopicsQueue){
      const wordCount=FR_WORDS.filter(w=>w.c===topic).length;
      const banner=div('topic-complete-banner');
      const tIcon=div('topic-complete-icon');tIcon.textContent='🏆';
      const tText=div('topic-complete-text');
      const tTitle=div('topic-complete-title');tTitle.textContent='Topic Complete!';
      const tSub=div('topic-complete-sub');tSub.textContent=topic;
      tSub.append(document.createElement('br'),document.createTextNode(wordCount+' words — solidify them with a full mastery review.'));
      tText.append(tTitle,tSub);banner.append(tIcon,tText);
      const rb=btn('btn-primary btn-full',`Start Mastery Review (${wordCount} words)`,()=>{
        FS.completedTopicsQueue=FS.completedTopicsQueue.filter(t=>t!==topic);
        startFrComprehensiveReview(topic);
      });
      rb.style.marginTop='8px';
      const wrap=div('card');wrap.style.padding='18px';
      wrap.append(banner,rb);
      elems.push(wrap);
    }
  }
  return elems;
}

render();

</script>
