<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German B2 Trainer</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--card:#fff;--primary:#3b5bdb;--plight:#e8edff;
  --ok:#2f9e44;--okl:#d3f9d8;--err:#c92a2a;--errl:#ffe3e3;
  --warn:#e67700;--warnl:#fff3bf;--text:#1a1a2e;--muted:#6c757d;
  --border:#dee2e6;--shadow:0 2px 8px rgba(0,0,0,.1);--radius:12px;
  --hard:#ae3ec9;--hardl:#f3d9fa
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
#app{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.card-sm{padding:14px 18px}
.hidden{display:none!important}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;
  border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;
  transition:opacity .15s,transform .1s;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover:not(:disabled){opacity:.88}
.btn-ok{background:var(--ok);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-hard{background:var(--hard);color:#fff}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center}

.stats-row{display:flex;gap:8px;flex-wrap:wrap}
.stat-chip{flex:1;min-width:80px;background:var(--plight);border-radius:8px;padding:10px 12px;text-align:center}
.stat-chip .n{font-size:22px;font-weight:800;color:var(--primary);display:block}
.stat-chip .l{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}

.action-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:18px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;
  border:2px solid transparent;transition:border-color .15s}
.action-card:hover{border-color:var(--primary)}
.action-card.dim{opacity:.45;cursor:not-allowed;pointer-events:none}
.action-icon{font-size:28px;width:48px;height:48px;display:flex;align-items:center;
  justify-content:center;border-radius:10px;flex-shrink:0}
.ic-blue{background:var(--plight)}
.ic-green{background:var(--okl)}
.ic-orange{background:var(--warnl)}
.ic-purple{background:var(--hardl)}
.ic-teal{background:#c3fae8}
.action-info{flex:1}
.action-title{font-size:16px;font-weight:700}
.action-sub{font-size:13px;color:var(--muted);margin-top:2px}
.badge{background:var(--primary);color:#fff;border-radius:999px;padding:2px 10px;
  font-size:13px;font-weight:700;flex-shrink:0}
.badge-ok{background:var(--ok)}
.badge-hard{background:var(--hard)}

.streak{background:linear-gradient(135deg,#3b5bdb,#7048e8);color:#fff;
  border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:14px}
.streak-n{font-size:38px;font-weight:900;line-height:1}
.streak-sub{font-size:13px;opacity:.85;margin-top:2px}

.prog-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .3s}

.page-hdr{display:flex;align-items:center;gap:10px}
.back{background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;
  border-radius:6px;color:var(--muted)}
.back:hover{background:var(--bg)}
h1{font-size:24px;font-weight:900}
h2{font-size:18px;font-weight:700}

.cat-badge{display:inline-block;background:var(--bg);border:1px solid var(--border);
  border-radius:99px;padding:3px 10px;font-size:11px;color:var(--muted);
  font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
  font-weight:600;margin-bottom:6px}
.prompt-en{font-size:30px;font-weight:800;line-height:1.2;margin-bottom:4px}
.de-big{font-size:32px;font-weight:900;color:var(--primary);margin:12px 0 4px;line-height:1.2}

.study-box{border:2px solid var(--primary);border-radius:10px;padding:18px;
  background:var(--plight);margin:14px 0}
.study-row{display:flex;align-items:baseline;gap:10px;margin:6px 0}
.study-lang{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;width:24px;flex-shrink:0}
.study-word{font-size:22px;font-weight:700;line-height:1.3}
.study-word.de{color:var(--primary);font-size:26px;font-weight:800}
.tip{font-size:13px;color:var(--muted);line-height:1.5;margin-top:8px}

.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.mc-opt{padding:14px 10px;border:2px solid var(--border);border-radius:8px;
  background:var(--card);cursor:pointer;font-size:14px;font-weight:500;
  text-align:center;transition:border-color .12s,background .12s;
  font-family:inherit;line-height:1.3}
.mc-opt:hover:not(.mc-locked){border-color:var(--primary);background:var(--plight)}
.mc-correct{border-color:var(--ok)!important;background:var(--okl)!important;color:var(--ok);font-weight:700}
.mc-wrong{border-color:var(--err)!important;background:var(--errl)!important;color:var(--err)}
.mc-locked{cursor:not-allowed}

.word-input{width:100%;padding:14px 16px;font-size:20px;border:2px solid var(--border);
  border-radius:8px;outline:none;margin-top:14px;transition:border-color .2s;font-family:inherit}
.word-input:focus{border-color:var(--primary)}
.input-ok{border-color:var(--ok)!important;background:var(--okl)}
.input-err{border-color:var(--err)!important;background:var(--errl)}
.input-warn{border-color:var(--warn)!important;background:var(--warnl)}
.umlaut-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.uml{padding:6px 11px;border:1.5px solid var(--border);border-radius:6px;
  background:var(--card);cursor:pointer;font-size:15px;font-family:inherit;transition:background .12s}
.uml:hover{background:var(--plight);border-color:var(--primary)}

.feedback{padding:12px 16px;border-radius:8px;font-size:15px;font-weight:500;margin-top:12px}
.fb-ok{background:var(--okl);color:var(--ok)}
.fb-err{background:var(--errl);color:var(--err)}
.fb-warn{background:var(--warnl);color:var(--warn)}
.fb-info{background:var(--plight);color:var(--primary)}

.rating-row{display:flex;gap:8px;margin-top:12px}
.rbtn{flex:1;padding:10px 6px;border:2px solid var(--border);border-radius:8px;
  background:var(--card);cursor:pointer;font-size:13px;font-weight:700;
  text-align:center;transition:background .12s,border-color .12s;font-family:inherit}
.rbtn sub{display:block;font-size:10px;font-weight:400;color:var(--muted);margin-top:2px}
.r-bad{border-color:var(--err);color:var(--err)}.r-bad:hover{background:var(--errl)}
.r-hard{border-color:var(--warn);color:var(--warn)}.r-hard:hover{background:var(--warnl)}
.r-ok{border-color:var(--primary);color:var(--primary)}.r-ok:hover{background:var(--plight)}
.r-easy{border-color:var(--ok);color:var(--ok)}.r-easy:hover{background:var(--okl)}

.sum-row{display:flex;justify-content:space-between;padding:10px 0;
  border-bottom:1px solid var(--border);font-size:15px}
.sum-row:last-child{border-bottom:none}

/* Round transition screen */
.transition-card{text-align:center;padding:32px 24px}
.round-pill{display:inline-block;background:var(--primary);color:#fff;
  border-radius:999px;padding:4px 14px;font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.transition-icon{font-size:56px;margin-bottom:12px}
.round-dots{display:flex;gap:8px;justify-content:center;margin:16px 0}
.dot{width:12px;height:12px;border-radius:50%;background:var(--border)}
.dot.done{background:var(--ok)}
.dot.active{background:var(--primary)}

/* Session header pills */
.session-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.round-tag{background:var(--primary);color:#fff;border-radius:999px;
  padding:3px 10px;font-size:12px;font-weight:700}
.round-tag.r2{background:var(--warn)}
.round-tag.r3{background:var(--hard)}
.pos-tag{font-size:13px;color:var(--muted)}

/* Learned box */
.learned-box{background:var(--plight);border-radius:10px;padding:18px;margin:16px 0;text-align:center}

/* Word list */
.stat-chip{cursor:pointer;transition:box-shadow .15s,transform .1s}
.stat-chip:hover{box-shadow:0 0 0 2px var(--primary);transform:scale(1.03)}
.word-list{display:flex;flex-direction:column;gap:0}
.wl-item{display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border);cursor:default}
.wl-item:last-child{border-bottom:none}
.wl-idx{font-size:12px;color:var(--muted);width:28px;flex-shrink:0;text-align:right;font-weight:600}
.wl-body{flex:1;min-width:0}
.wl-de{font-size:17px;font-weight:700;color:var(--primary);line-height:1.2}
.wl-en{font-size:13px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-meta{font-size:11px;color:var(--muted);margin-top:3px}
.wl-right{font-size:12px;color:var(--muted);text-align:right;flex-shrink:0;line-height:1.4}
.wl-interval{font-weight:700;color:var(--primary);font-size:13px}
.wl-cat{font-size:10px;background:var(--bg);border:1px solid var(--border);
  border-radius:99px;padding:2px 7px;color:var(--muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.list-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px}
.list-count{font-size:13px;color:var(--muted);margin-bottom:14px;font-weight:600}

/* Topic select */
.topic-item{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;
  border:2px solid transparent;transition:border-color .15s}
.topic-item:hover{border-color:var(--primary)}
.topic-info{flex:1;min-width:0}
.topic-name{font-size:15px;font-weight:700;line-height:1.2}
.topic-meta{font-size:12px;color:var(--muted);margin-top:3px}
.topic-prog{height:4px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden}
.topic-prog-fill{height:100%;background:var(--primary);border-radius:2px}
.topic-count{font-size:20px;font-weight:800;color:var(--primary);flex-shrink:0;text-align:right;line-height:1}
.topic-count sub{font-size:11px;font-weight:600;color:var(--muted);display:block;text-align:right;margin-top:1px}

/* Speak button */
.speak-btn{background:none;border:1.5px solid var(--border);border-radius:6px;
  cursor:pointer;padding:5px 9px;font-size:14px;transition:background .12s,border-color .12s;
  line-height:1;flex-shrink:0;vertical-align:middle}
.speak-btn:hover{background:var(--plight);border-color:var(--primary)}
.remove-btn{background:none;border:1.5px solid var(--border);border-radius:6px;
  cursor:pointer;padding:4px 8px;font-size:13px;color:var(--muted);
  transition:background .12s,border-color .12s,color .12s;line-height:1;flex-shrink:0}
.remove-btn:hover{background:#fef2f2;border-color:#f87171;color:#dc2626}
.edit-wl-btn{background:none;border:1.5px solid var(--border);border-radius:6px;
  cursor:pointer;padding:4px 7px;font-size:13px;color:var(--muted);
  transition:background .12s,border-color .12s;line-height:1;flex-shrink:0}
.edit-wl-btn:hover{background:var(--plight);border-color:var(--primary);color:var(--primary)}

/* Activity chart */
.chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.chart-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.chart-legend{display:flex;gap:10px;font-size:11px;color:var(--muted)}
.chart-legend span b{font-weight:800}
/* Vocab progress */
.vocab-prog-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin:8px 0 4px}
.vocab-prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),#7048e8);border-radius:5px;transition:width .4s}

/* Sunday banner */
.sunday-banner{background:linear-gradient(135deg,#e67700,#f59f00);color:#fff;
  border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:14px}
.sunday-icon{font-size:28px;width:44px;height:44px;display:flex;align-items:center;
  justify-content:center;border-radius:10px;background:rgba(255,255,255,.22);flex-shrink:0}

/* Sentence practice */
.sentence-ta{width:100%;padding:14px 16px;font-size:16px;border:2px solid var(--border);
  border-radius:8px;resize:vertical;min-height:90px;font-family:inherit;outline:none;
  transition:border-color .2s;line-height:1.5;margin-top:14px}
.sentence-ta:focus{border-color:var(--primary)}
.sentence-ta:disabled{background:var(--bg);color:var(--muted)}
.speak-btn-lg{padding:9px 14px;font-size:20px;border-radius:8px}
.speak-row{display:flex;align-items:center;gap:10px;margin-top:10px}

/* French module */
.lang-toggle{display:flex;gap:0;border-radius:10px;overflow:hidden;border:2px solid var(--border);background:var(--bg);flex-shrink:0}
.lang-btn{padding:8px 18px;border:none;background:transparent;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--muted);transition:background .15s,color .15s}
.lang-btn.active{background:var(--primary);color:#fff}
.fr-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.grammar-lesson{line-height:1.7;font-size:15px}
.grammar-lesson h3{font-size:17px;font-weight:800;margin:18px 0 8px;color:var(--primary)}
.grammar-lesson h3:first-child{margin-top:0}
.grammar-lesson p{margin-bottom:10px;color:var(--text)}
.grammar-lesson .tip-box{background:var(--warnl);border-left:4px solid var(--warn);padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:14px}
.grammar-lesson .note-box{background:var(--plight);border-left:4px solid var(--primary);padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:14px}
.grammar-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px}
.grammar-table th{background:var(--plight);padding:8px 10px;text-align:left;font-weight:700;color:var(--primary);border:1px solid var(--border)}
.grammar-table td{padding:8px 10px;border:1px solid var(--border)}
.grammar-table tr:nth-child(even) td{background:var(--bg)}
.fr-word{font-size:28px;font-weight:900;color:#c92a2a;line-height:1.2}
.fr-phon{font-size:14px;color:var(--muted);font-style:italic;margin:4px 0 2px}
.fr-en{font-size:18px;font-weight:700;color:var(--text)}
.fr-tip{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
.fr-study-box{border:2px solid #c92a2a;background:#fff5f5;border-radius:10px;padding:18px;margin:14px 0;text-align:center}
.lesson-item{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;margin-bottom:0}
.lesson-item:hover{border-color:var(--primary)}
.lesson-item.done{border-color:var(--ok)}
.lesson-icon{font-size:22px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--plight);flex-shrink:0}
.lesson-icon.done{background:var(--okl)}
.lesson-info{flex:1;min-width:0}
.lesson-title{font-size:15px;font-weight:700}
.lesson-meta{font-size:12px;color:var(--muted);margin-top:2px}
.fr-mc-opt{padding:13px 14px;border:2px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:15px;font-weight:500;text-align:left;transition:border-color .12s,background .12s;font-family:inherit;line-height:1.3;width:100%;margin-bottom:8px}
.fr-mc-opt:hover:not(.fr-mc-locked){border-color:#c92a2a;background:#fff5f5}
.fr-mc-correct{border-color:var(--ok)!important;background:var(--okl)!important;color:var(--ok);font-weight:700}
.fr-mc-wrong{border-color:var(--err)!important;background:var(--errl)!important;color:var(--err)}
.fr-mc-locked{cursor:not-allowed}
.fr-prog-section{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px}

/* Topic completion banner */
.topic-complete-banner{background:linear-gradient(135deg,#b7791f,#f6ad55);color:#fff;
  border-radius:var(--radius);padding:20px 22px;display:flex;align-items:center;gap:16px;margin-bottom:4px}
.topic-complete-icon{font-size:34px;width:54px;height:54px;display:flex;align-items:center;
  justify-content:center;border-radius:12px;background:rgba(255,255,255,.22);flex-shrink:0}
.topic-complete-text{flex:1}
.topic-complete-title{font-size:17px;font-weight:800;line-height:1.2}
.topic-complete-sub{font-size:13px;opacity:.88;margin-top:3px;line-height:1.4}

</style>
</head>

<div id="app"></div>

// ── Storage ───────────────────────────────────────────────────────────────────
const SK='german_srs_v3';
const FK='french_srs_v1';
function load(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){return{}}}
function save(){localStorage.setItem(SK,JSON.stringify(prog))}
let prog=load();

// ── Progress export / import (both languages) ─────────────────────────────────
function exportProgress(){
  const data={
    german:localStorage.getItem(SK)||'{}',
    french:localStorage.getItem(FK)||'{}',
    exportedAt:new Date().toISOString()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='trainer-progress.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importProgress(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.german&&!data.french)throw new Error('no data');
        if(data.german)localStorage.setItem(SK,data.german);
        if(data.french)localStorage.setItem(FK,data.french);
        alert('Progress imported successfully! The app will now reload.');
        location.reload();
      }catch{alert('Invalid file — please use a file exported from this app.');}
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}

function card(id){
  if(!prog[id])prog[id]={interval:0,ef:2.5,reps:0,nextReview:null,
    introduced:false,introDate:null,lastWrong:null};
  return prog[id];
}

// ── Date helpers ──────────────────────────────────────────────────────────────
// All "day" boundaries are midnight America/New_York (EST/EDT auto-handled).
function today(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'})}
function addDays(d,n){
  // Parse date components directly → add n days → re-format.
  // Using noon UTC avoids any DST or timezone edge at day boundaries.
  const[y,mo,dy]=d.split('-').map(Number);
  return new Date(Date.UTC(y,mo-1,dy+n,12)).toISOString().slice(0,10);
}
function daysSince(d){
  // Pure calendar-date arithmetic; both dates are already Eastern.
  if(!d)return 999;
  const[ty,tm,td]=today().split('-').map(Number);
  const[oy,om,od]=d.split('-').map(Number);
  return Math.round((Date.UTC(ty,tm-1,td)-Date.UTC(oy,om-1,od))/86400000);
}

// ── SM-2 ──────────────────────────────────────────────────────────────────────
function sm2(c,q){
  if(q===0){
    c.reps=0;c.interval=1;c.lastWrong=today();
    c.nextReview=today(); // due again immediately (same-day session or tomorrow)
  } else {
    const qv=q===1?3:q===2?4:5;
    c.ef=Math.max(1.3,c.ef+0.1-(5-qv)*(0.08+(5-qv)*0.02));
    if(c.reps===0)c.interval=1;
    else if(c.reps===1)c.interval=6;
    else c.interval=Math.max(1,Math.round(c.interval*c.ef));
    if(q===3)c.interval=Math.round(c.interval*1.3);
    c.reps++;
    c.nextReview=addDays(today(),c.interval);
  }
}

// ── Word queries ──────────────────────────────────────────────────────────────
function withId(){
  const wo=prog._wo||{};
  const base=WORDS.map((w,i)=>{
    if(prog[i]&&prog[i]._hidden)return null;
    return{...w,...(wo[i]||{}),id:i};
  }).filter(Boolean);
  const extra=(prog._xw||[]).map((w,xi)=>{
    const id=WORDS.length+xi;
    if(prog[id]&&prog[id]._hidden)return null;
    return{...w,id};
  }).filter(Boolean);
  return[...base,...extra];
}
function dueWords(){const t=today();return withId().filter(w=>{const c=card(w.id);return c.introduced&&c.nextReview&&c.nextReview<=t})}
function todayWords(){const t=today();return withId().filter(w=>card(w.id).introDate===t)}
function newWords(){return withId().filter(w=>!card(w.id).introduced)}
function difficultWords(){
  return withId().filter(w=>{
    const c=card(w.id);
    return c.introduced && c.lastWrong && daysSince(c.lastWrong)<=30;
  });
}
function totalIntroduced(){return withId().filter(w=>card(w.id).introduced).length}
function isSunday(){
  return new Date().toLocaleDateString('en-US',{timeZone:'America/New_York',weekday:'long'})==='Sunday';
}
function weeklyReviewWords(){
  // Words introduced in the past 1–7 days (Mon–Sat when called on Sunday, or rolling 7 days any day)
  return shuffle(withId().filter(w=>{
    const c=card(w.id);
    if(!c.introduced||!c.introDate)return false;
    const d=daysSince(c.introDate);
    return d>=1&&d<=7;
  }));
}
function sentenceContainsWord(sentence,german){
  // Strip leading article so "der Hund" checks for "hund"
  const base=german.replace(/^(der|die|das|ein|eine|einem|einer|eines)\s+/i,'');
  const ns=norm(sentence), nb=norm(base);
  if(!ns||!nb)return false;
  if(ns.includes(nb))return true;
  // Accept simple stem match (last 2 chars dropped) for inflected forms
  if(nb.length>5&&ns.includes(nb.slice(0,nb.length-2)))return true;
  return false;
}
function streak(){
  const dates=new Set();
  // Count any day a word was introduced OR any review/practice activity happened
  for(const id in prog){
    const v=prog[id];
    if(v&&typeof v==='object'&&!Array.isArray(v)&&v.introDate)dates.add(v.introDate);
  }
  if(prog._rl)for(const d in prog._rl)if(prog._rl[d]>0)dates.add(d);
  let s=0,d=today();
  while(dates.has(d)){s++;d=addDays(d,-1)}
  return s;
}
function logReview(){
  if(!prog._rl)prog._rl={};
  const t=today();prog._rl[t]=(prog._rl[t]||0)+1;
  save();
}
function getDailyStats(days=14){
  const out=[];
  for(let i=days-1;i>=0;i--){
    const d=addDays(today(),-i);
    out.push({date:d,
      learned:withId().filter(w=>card(w.id).introDate===d).length,
      reviewed:(prog._rl&&prog._rl[d])||0});
  }
  return out;
}

// ── Answer checking ───────────────────────────────────────────────────────────
function norm(s){
  return s.toLowerCase().trim()
    .replace(/ü/g,'ue').replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ß/g,'ss')
    .replace(/\s+/g,' ');
}
function lev(a,b){
  if(a===b)return 0;
  const m=a.length,n=b.length;
  const r=Array.from({length:m+1},(_,i)=>i===0?[...Array(n+1).keys()]:[i,...Array(n).fill(0)]);
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    r[i][j]=a[i-1]===b[j-1]?r[i-1][j-1]:1+Math.min(r[i-1][j],r[i][j-1],r[i-1][j-1]);
  return r[m][n];
}
function check(input,german){
  const u=norm(input);
  if(!u)return'wrong';
  const alts=german.split('/').map(a=>a.trim());
  for(const a of alts)if(u===norm(a))return'correct';
  const d=Math.min(...alts.map(a=>lev(u,norm(a))));
  const minLen=Math.min(...alts.map(a=>a.length));
  if(d<=1&&minLen>4)return'close';
  return'wrong';
}

// ── Distractors ───────────────────────────────────────────────────────────────
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function distractors(word,n){
  const same=shuffle(WORDS.filter(w=>w.c===word.c&&w.g!==word.g));
  const diff=shuffle(WORDS.filter(w=>w.c!==word.c&&w.g!==word.g));
  const pool=[...same,...diff];
  const seen=new Set([word.g]);const out=[];
  for(const w of pool){if(!seen.has(w.g)){seen.add(w.g);out.push(w.g);if(out.length===n)break}}
  while(out.length<n){const r=WORDS[Math.floor(Math.random()*WORDS.length)];if(!seen.has(r.g)){seen.add(r.g);out.push(r.g)}}
  return out;
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function el(tag,props,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(props||{})){
    if(k==='cls')e.className=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  }
  for(const c of kids)if(c!=null)e.append(typeof c==='string'?document.createTextNode(c):c);
  return e;
}

// ── Activity chart (SVG) ─────────────────────────────────────────────────────
function buildActivityChart(data){
  const ns='http://www.w3.org/2000/svg';
  const mk=(tag,attrs)=>{const e=document.createElementNS(ns,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e};
  const W=480,H=130,padL=28,padR=8,padT=10,padB=26;
  const pw=W-padL-padR,ph=H-padT-padB;
  const n=data.length;
  const maxRaw=Math.max(1,...data.map(d=>Math.max(d.learned,d.reviewed)));
  const niceMax=v=>{if(v<=5)return 5;if(v<=10)return 10;if(v<=20)return 20;if(v<=30)return 30;if(v<=50)return 50;return Math.ceil(v/10)*10};
  const maxV=niceMax(maxRaw);
  const xp=i=>padL+(i/Math.max(n-1,1))*pw;
  const yp=v=>padT+ph-(v/maxV)*ph;
  const svg=mk('svg',{viewBox:`0 0 ${W} ${H}`,xmlns:ns});
  svg.style.cssText='width:100%;height:130px;display:block;overflow:visible';

  // Grid lines + Y labels at 0%, 50%, 100%
  [0,0.5,1].forEach(f=>{
    const gv=f*maxV,gy=yp(gv);
    svg.append(mk('line',{x1:padL,y1:gy.toFixed(1),x2:W-padR,y2:gy.toFixed(1),stroke:'#dee2e6','stroke-width':'1'}));
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',padL-4);t.setAttribute('y',(gy+4).toFixed(1));
    t.setAttribute('text-anchor','end');t.setAttribute('font-size','9');
    t.setAttribute('font-family','system-ui,sans-serif');t.setAttribute('fill','#6c757d');
    t.textContent=Math.round(gv);svg.append(t);
  });

  // Series: area + line + dots  [{key,color,fillOpacity}]
  [{key:'reviewed',color:'#2f9e44',fo:'0.1'},{key:'learned',color:'#3b5bdb',fo:'0.13'}].forEach(s=>{
    const pts=data.map((d,i)=>`${xp(i).toFixed(1)},${yp(d[s.key]).toFixed(1)}`);
    const baseY=yp(0).toFixed(1);
    svg.append(mk('polygon',{points:[...pts,`${xp(n-1).toFixed(1)},${baseY}`,`${xp(0).toFixed(1)},${baseY}`].join(' '),
      fill:s.color,'fill-opacity':s.fo,stroke:'none'}));
    svg.append(mk('polyline',{points:pts.join(' '),fill:'none',stroke:s.color,'stroke-width':'2',
      'stroke-linejoin':'round','stroke-linecap':'round'}));
    data.forEach((d,i)=>{if(d[s.key]>0)svg.append(mk('circle',{cx:xp(i).toFixed(1),cy:yp(d[s.key]).toFixed(1),r:'3',fill:s.color}))});
  });

  // X labels: every 2 days + last
  data.forEach((d,i)=>{
    if(i%2!==0&&i!==n-1)return;
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',xp(i).toFixed(1));t.setAttribute('y',H-8);
    t.setAttribute('text-anchor',i===0?'start':i===n-1?'end':'middle');
    t.setAttribute('font-size','9');t.setAttribute('font-family','system-ui,sans-serif');t.setAttribute('fill','#6c757d');
    t.textContent=i===n-1?'Today':new Date(d.date+'T12:00:00').toLocaleDateString('en',{timeZone:'America/New_York',month:'short',day:'numeric'});
    svg.append(t);
  });
  return svg;
}

// ── Start actions ─────────────────────────────────────────────────────────────
function goHome(){prog=load();Object.assign(S,{screen:'home',rtype:null,topicFilter:null,editWordId:null,queue:[],qIdx:0,
  learnBatch:[],studyQ:[],mcQ:[],typeQ:[],learnMastered:[],currentCard:null,

  wrongQ:[],retrying:false,stats:{correct:0,wrong:0,learned:0},
  sentenceWords:[],sentenceIdx:0,completedTopicsQueue:[]});render()}

function startLearn(){
  const nw=newWords();
  if(!nw.length){alert('You have introduced all '+WORDS.length+' words!');return}
  const batch=nw.slice(0,BATCH);
  Object.assign(S,{screen:'learn',learnBatch:batch,
    studyQ:[...batch],mcQ:[],typeQ:[],learnMastered:[],
    mcOpts:[],mcDone:false,mcOk:null,lastChosen:null,
    stats:{correct:0,wrong:0,learned:0}});
  S.currentCard=getNextLearnCard();
  render();
}

// ── Learn pipeline ─────────────────────────────────────────────────────────────
// Priority: drain MC backlog (≥3) → drain type backlog (≥2) → introduce new → drain remainder
function getNextLearnCard(){
  if(S.mcQ.length>=3)   return{word:S.mcQ.shift(),  stage:'mc'};
  if(S.typeQ.length>=2) return{word:S.typeQ.shift(), stage:'type'};
  if(S.studyQ.length>0) return{word:S.studyQ.shift(),stage:'study'};
  if(S.mcQ.length>0)    return{word:S.mcQ.shift(),   stage:'mc'};
  if(S.typeQ.length>0)  return{word:S.typeQ.shift(), stage:'type'};
  return null;
}

function advanceLearn(onCurrentCard){
  // onCurrentCard mutates the queues based on result, then we pick next
  onCurrentCard();
  const next=getNextLearnCard();
  if(!next){finishLearnSession();return;}
  S.currentCard=next;
  render();
}

function finishLearnSession(){
  for(const w of S.learnBatch){
    const c=card(w.id);
    c.introduced=true;c.introDate=today();c.reps=1;c.interval=1;c.nextReview=addDays(today(),1);
  }
  save();
  S.stats.learned=S.learnBatch.length;
  // Detect newly-completed topic categories
  const batchCats=new Set(S.learnBatch.map(w=>w.c));
  const completed=[];
  for(const cat of batchCats){
    const all=withId().filter(w=>w.c===cat);
    if(all.length>0&&all.every(w=>card(w.id).introduced))completed.push(cat);
  }
  S.completedTopicsQueue=completed;
  S.screen='summary';render();
}

function startComprehensiveReview(topic){
  const words=shuffle(withId().filter(w=>w.c===topic));
  if(!words.length)return;
  Object.assign(S,{screen:'review',rtype:'comprehensive',topicFilter:topic,queue:words,qIdx:0,
    wrongQ:[],retrying:false,stats:{correct:0,wrong:0,learned:0}});
  render();
}

function startReview(type){
  const map={today:()=>shuffle(todayWords()),daily:()=>shuffle(dueWords()),
    difficult:()=>shuffle(difficultWords()),weekly:weeklyReviewWords};
  const words=(map[type]||map.today)();
  if(!words.length)return;
  Object.assign(S,{screen:'review',rtype:type,queue:words,qIdx:0,
    wrongQ:[],retrying:false,stats:{correct:0,wrong:0,learned:0}});
  render();
}

function startSentencePractice(){
  const words=weeklyReviewWords();
  if(!words.length){alert('No words from the past 7 days to practise.');return}
  Object.assign(S,{screen:'sentence',sentenceWords:words,sentenceIdx:0});
  render();
}

function startTopicReview(topic){
  const words=shuffle(withId().filter(w=>w.c===topic));
  if(!words.length)return;
  Object.assign(S,{screen:'review',rtype:'topic',topicFilter:topic,queue:words,qIdx:0,
    wrongQ:[],retrying:false,stats:{correct:0,wrong:0,learned:0}});
  render();
}

// ── Form helpers ──────────────────────────────────────────────────────────────
function parseCSVLine(line){
  const cols=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ;}
    else if(ch===','&&!inQ){cols.push(cur);cur='';}
    else cur+=ch;
  }
  cols.push(cur);return cols;
}
function mkFormField(label,placeholder,val=''){
  const wrap=div('');wrap.style.marginBottom='16px';
  const lbl=el('label',{style:'font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:6px'},label);
  const inp=el('input',{type:'text',cls:'word-input',placeholder,style:'margin-top:0;font-size:16px'});
  inp.value=val;
  wrap.append(lbl,inp);return{wrap,inp};
}
function mkFormTextarea(label,placeholder){
  const wrap=div('');wrap.style.marginBottom='14px';
  const lbl=el('label',{style:'font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:6px'},label);
  const ta=el('textarea',{placeholder,rows:'10',
    style:'width:100%;padding:12px 14px;font-size:13px;line-height:1.55;border:2px solid var(--border);border-radius:8px;font-family:monospace;resize:vertical;outline:none;transition:border-color .2s'});
  ta.addEventListener('focus',()=>ta.style.borderColor='var(--primary)');
  ta.addEventListener('blur',()=>ta.style.borderColor='var(--border)');
  wrap.append(lbl,ta);return{wrap,ta};
}

// ── Topic select screen ───────────────────────────────────────────────────────
function renderTopicSelect(){
  // Collect unique categories in corpus order
  const seen=new Set(),cats=[];
  for(const w of withId()){if(!seen.has(w.c)){seen.add(w.c);cats.push(w.c)}}

  const hdr=div('page-hdr card card-sm');
  hdr.append(
    el('button',{cls:'back',onclick:goHome},'←'),
    el('h2',{},'Practice by Topic'),
    el('span',{style:'font-size:13px;color:var(--muted);margin-left:auto'},cats.length+' topics')
  );

  const items=cats.map(cat=>{
    const words=withId().filter(w=>w.c===cat);
    const learnedN=words.filter(w=>card(w.id).introduced).length;
    const pct=words.length?Math.round(learnedN/words.length*100):0;

    const item=div('topic-item');
    const info=div('topic-info');
    const name=el('div',{cls:'topic-name'},cat);
    const meta=el('div',{cls:'topic-meta'},`${learnedN} of ${words.length} learned`);
    const prog=div('topic-prog');
    const fill=div('topic-prog-fill');
    fill.style.width=pct+'%';
    prog.append(fill);
    info.append(name,meta,prog);

    const cnt=div('topic-count');
    cnt.innerHTML=`${words.length}<sub>words</sub>`;

    item.append(info,cnt);
    item.addEventListener('click',()=>startTopicReview(cat));
    return item;
  });

  return nodes(hdr,...items);
}

// ── Learn screen ──────────────────────────────────────────────────────────────
function renderLearn(){
  const cc=S.currentCard;
  if(!cc)return[];  // shouldn't happen; finishLearnSession() handles null

  const total=S.learnBatch.length;
  const done=S.learnMastered.length;

  // Header
  const hdr=div('card card-sm');
  const topRow=div('page-hdr');
  topRow.append(
    el('button',{cls:'back',onclick:goHome},'←'),
    el('h2',{},'Learn New Words'),
    el('span',{style:'font-size:13px;color:var(--muted);margin-left:auto'},`✓ ${done}/${total}`)
  );

  // Pipeline status row
  const pipeRow=div('');
  pipeRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)';
  const pip=(icon,n,bg,fg)=>{
    const c=div('');
    c.style.cssText=`font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px;background:${bg};color:${fg}`;
    c.textContent=`${icon} ${n}`;return c;
  };
  if(S.studyQ.length>0) pipeRow.append(pip('📚',S.studyQ.length,'var(--bg)','var(--muted)'));
  if(S.mcQ.length>0)    pipeRow.append(pip('⚡',S.mcQ.length,'var(--warnl)','var(--warn)'));
  if(S.typeQ.length>0)  pipeRow.append(pip('✍️',S.typeQ.length,'var(--hardl)','var(--hard)'));
  if(done>0)            pipeRow.append(pip('✓',done,'var(--okl)','var(--ok)'));

  // Progress bar
  const pb=div('prog-bar');
  const pf=div('prog-fill');pf.style.width=(done/total*100)+'%';pb.append(pf);

  let cardEl;
  if(cc.stage==='study') cardEl=renderStudyCard(cc.word);
  else if(cc.stage==='mc') cardEl=renderMCCard(cc.word);
  else cardEl=renderLearnTypeCard(cc.word);

  return nodes(hdr,pb,cardEl);

// ── MC card ───────────────────────────────────────────────────────────────────
function renderMCCard(w){
  if(!S.mcDone&&!S.mcOpts.length){
    S.mcOpts=shuffle([w.g,...distractors(w,3)]);
  }
  const c=div('card');
  const badge=div('cat-badge');badge.textContent=w.c;c.append(badge);
  c.append(el('div',{cls:'label'},'Multiple choice — you studied this recently'));
  c.append(el('div',{cls:'prompt-en'},w.e));

  const grid=div('mc-grid');
  for(const opt of S.mcOpts){
    const isOk=opt===w.g;
    const cls='mc-opt'+(S.mcDone?' mc-locked':'')
      +(S.mcDone&&isOk?' mc-correct':'')
      +(S.mcDone&&!isOk&&S.lastChosen===opt?' mc-wrong':'');
    const ob=el('button',{cls,type:'button'},opt);
    if(!S.mcDone)ob.addEventListener('click',()=>{S.mcDone=true;S.mcOk=isOk;S.lastChosen=opt;render()});
    grid.append(ob);
  }
  c.append(grid);

  if(S.mcDone){
    const resetMC=()=>{S.mcOpts=[];S.mcDone=false;S.mcOk=null;S.lastChosen=null};
    if(S.mcOk){
      const fb=div('feedback fb-ok');fb.append('✓ Correct! ',speakBtn(w.g));c.append(fb);
      const nb=btn('btn-ok btn-full','Next →',()=>advanceLearn(()=>{resetMC();S.typeQ.push(w);S.stats.correct++}));
      nb.style.marginTop='14px';c.append(nb);
    } else {
      const fb=div('feedback fb-err');fb.append('✗ Wrong — correct answer highlighted. ',speakBtn(w.g));c.append(fb);
      // Re-queue for MC retry after a few cards
      const nb=btn('btn-ghost btn-full','Next →',()=>advanceLearn(()=>{resetMC();S.mcQ.push(w);S.stats.wrong++}));
      nb.style.marginTop='14px';c.append(nb);
    }
  }
  return c;
}

// ── Type card (learn) ─────────────────────────────────────────────────────────
function renderLearnTypeCard(w){
  return buildTypeCard(w,{
    onCorrect:()=>advanceLearn(()=>{S.learnMastered.push(w);S.stats.correct++}),
    onWrong:()=>advanceLearn(()=>{S.typeQ.push(w);S.stats.wrong++}),
    trackSRS:false,
    retryBanner:null,
  });
}

// ── Review screen ─────────────────────────────────────────────────────────────
function renderReview(){
  if(S.qIdx>=S.queue.length){
    if(S.wrongQ.length>0&&!S.retrying){
      S.queue=shuffle(S.wrongQ);S.qIdx=0;S.wrongQ=[];S.retrying=true;render();return[];
    }
    S.screen='summary';render();return[];
  }

  const w=rcw();
  const title={today:"Today's Practice",daily:'Daily Review (SRS)',difficult:'Difficult Words',topic:S.topicFilter||'Topic Practice',weekly:'Weekly Review',comprehensive:'🏆 Topic Mastery Review'}[S.rtype]||'Review';

  const backFn=(S.rtype==='topic'||S.rtype==='comprehensive')?()=>{S.screen='topicselect';render()}:goHome;
  const hdr=div('page-hdr card card-sm');
  hdr.append(
    el('button',{cls:'back',onclick:backFn},'←'),
    el('h2',{},title),
    el('span',{style:'font-size:13px;color:var(--muted);margin-left:auto'},S.qIdx+'/'+S.queue.length)
  );

  const pb=div('prog-bar');
  const pf=div('prog-fill');
  pf.style.width=(S.queue.length?(S.qIdx/S.queue.length*100):0)+'%';
  pb.append(pf);

  const cardEl=buildTypeCard(w,{
    onCorrect:(quality)=>{
      if(S.rtype==='daily'||S.rtype==='difficult'||S.rtype==='comprehensive'||S.rtype==='weekly'){
        const c=card(w.id);sm2(c,quality);
        if((S.rtype==='difficult'||S.rtype==='comprehensive')&&quality>=2)c.lastWrong=null;
        save();
      }
      logReview();
      S.qIdx++;render();
    },
    onWrong:()=>{
      if(S.rtype==='daily'||S.rtype==='difficult'||S.rtype==='comprehensive'||S.rtype==='weekly'){
        const c=card(w.id);sm2(c,0);save(); // sm2(0) sets lastWrong + nextReview=today
      }
      logReview();
      S.wrongQ.push(w);S.qIdx++;render();
    },
    markMistake:()=>{
      if(S.rtype==='today'||S.rtype==='comprehensive'||S.rtype==='weekly'){const c=card(w.id);c.lastWrong=today();save()}
    },
    trackSRS:S.rtype==='daily'||S.rtype==='difficult'||S.rtype==='comprehensive'||S.rtype==='weekly',
    retryBanner:S.retrying?'Retry — words you missed earlier':null,
  });

  return nodes(hdr,pb,cardEl);
}

// ── Shared type card builder ──────────────────────────────────────────────────
// opts: { onCorrect(quality), onWrong(), trackSRS, retryBanner }
function buildTypeCard(w,opts){
  const c=div('card');
  const badge=div('cat-badge');badge.textContent=w.c;c.append(badge);

  if(opts.retryBanner)c.append(el('div',{cls:'feedback fb-info',style:'margin-bottom:12px'},opts.retryBanner));

  c.append(el('div',{cls:'label'},'Translate to German:'));
  c.append(el('div',{cls:'prompt-en'},w.e));

  const inp=el('input',{cls:'word-input',type:'text',placeholder:'Type German here…',
    autocomplete:'off',autocorrect:'off',spellcheck:'false'});

  const ur=div('umlaut-row');
  for(const ch of['ä','ö','ü','Ä','Ö','Ü','ß']){
    const ub=el('button',{cls:'uml',type:'button',onclick:()=>{
      const pos=inp.selectionStart,v=inp.value;
      inp.value=v.slice(0,pos)+ch+v.slice(pos);
      inp.setSelectionRange(pos+1,pos+1);inp.focus();
    }},ch);
    ur.append(ub);
  }

  const fb=div('feedback hidden');
  const ratingArea=div('hidden');
  const submitBtn=btn('btn-primary','Check →',submit);
  let answered=false;

  function submit(){
    if(answered)return;
    answered=true;
    const result=check(inp.value,w.g);
    inp.disabled=true;submitBtn.classList.add('hidden');
    fb.classList.remove('hidden');

    if(result==='correct'){
      inp.classList.add('input-ok');
      fb.className='feedback fb-ok';
      fb.innerHTML=`✓ Correct! <strong>${esc(w.g)}</strong> `;
      fb.append(speakBtn(w.g));
      speak(w.g);
      S.stats.correct++;
      ratingArea.classList.remove('hidden');
      if(opts.trackSRS){
        const row=div('rating-row');
        const ratings=[
          {q:0,cls:'r-bad',l:'Again',s:'Reset'},
          {q:1,cls:'r-hard',l:'Hard',s:'Short'},
          {q:2,cls:'r-ok',l:'Good',s:'Normal'},
          {q:3,cls:'r-easy',l:'Easy',s:'Longer'},
        ];
        for(const r of ratings){
          const rb=el('button',{cls:'rbtn '+r.cls,type:'button',
            onclick:()=>{if(r.q===0){opts.onWrong();}else{opts.onCorrect(r.q);}}});
          rb.innerHTML=`${r.l}<sub>${r.s}</sub>`;
          row.append(rb);
        }
        ratingArea.append(row);
      } else {
        ratingArea.append(btn('btn-ok btn-full','Continue →',()=>opts.onCorrect(2)));
      }
    } else if(result==='close'){
      opts.markMistake?.();
      inp.classList.add('input-warn');
      fb.className='feedback fb-warn';
      fb.innerHTML=`Almost! Correct: <strong>${esc(w.g)}</strong> `;
      fb.append(speakBtn(w.g));speak(w.g);
      S.stats.wrong++;
      ratingArea.classList.remove('hidden');
      ratingArea.append(btn('btn-ghost btn-full','Continue →',opts.onWrong));
    } else {
      opts.markMistake?.();
      inp.classList.add('input-err');
      fb.className='feedback fb-err';
      fb.innerHTML=`✗ Answer: <strong>${esc(w.g)}</strong> `;
      fb.append(speakBtn(w.g));speak(w.g);
      S.stats.wrong++;
      ratingArea.classList.remove('hidden');
      ratingArea.append(btn('btn-ghost btn-full','Continue →',opts.onWrong));
    }
  }

  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!answered)submit()});
  c.append(inp,ur,submitBtn,fb,ratingArea);
  setTimeout(()=>inp.focus(),50);
  return c;
}

// ── Summary ───────────────────────────────────────────────────────────────────
function renderSummary(){
  const isComprehensiveDone=S.rtype==='comprehensive';
  const c=div('card');
  c.innerHTML=`<div style="text-align:center;margin-bottom:20px">
    <div style="font-size:48px">${isComprehensiveDone?'🏆':S.stats.learned>0?'🎉':'✨'}</div>
    <h2 style="margin-top:10px">${isComprehensiveDone?'Mastery Review Complete':'Session Complete'}</h2>
  </div>`;
  const addRow=(l,v)=>{const r=div('sum-row');r.innerHTML=`<span>${l}</span><strong>${v}</strong>`;c.append(r)};
  if(S.stats.learned)addRow('Words introduced',S.stats.learned);
  const tot=S.stats.correct+S.stats.wrong;
  if(tot){
    addRow('Correct',S.stats.correct);
    addRow('Wrong',S.stats.wrong);
    addRow('Accuracy',Math.round(S.stats.correct/tot*100)+'%');
  }
  addRow('Total introduced',totalIntroduced()+' / '+WORDS.length);
  addRow('Due tomorrow',withId().filter(w=>{const c2=card(w.id);return c2.introduced&&c2.nextReview===addDays(today(),1)}).length);

  // Trophy banner + comprehensive review prompt for each completed topic
  const elems=[c];
  if(S.completedTopicsQueue.length>0){
    for(const topic of S.completedTopicsQueue){
      const wordCount=withId().filter(w=>w.c===topic).length;
      const banner=div('topic-complete-banner');
      const tIcon=div('topic-complete-icon');tIcon.textContent='🏆';
      const tText=div('topic-complete-text');
      const tTitle=div('topic-complete-title');tTitle.textContent='Topic Complete!';
      const tSub=div('topic-complete-sub');tSub.textContent=topic;
      tSub.append(document.createElement('br'),document.createTextNode(wordCount+' words — now solidify them with a full review.'));
      tText.append(tTitle,tSub);banner.append(tIcon,tText);
      const rb=btn('btn-primary btn-full',`Start Mastery Review (${wordCount} words)`,()=>{
        // Remove this topic from queue, start comprehensive review
        S.completedTopicsQueue=S.completedTopicsQueue.filter(t=>t!==topic);
        startComprehensiveReview(topic);
      });
      rb.style.marginTop='8px';
      const wrap=div('card');
      wrap.style.padding='18px';
      wrap.append(banner,rb);
      elems.push(wrap);
    }
  }

  const hb=btn('btn-primary btn-full','← Home',goHome);
  hb.style.marginTop='18px';c.append(hb);
  return elems;
}

// ── Word List Browser ─────────────────────────────────────────────────────────
function renderWordList(){
  const cfg={
    today:{label:"Learned Today",   words:()=>todayWords().sort((a,b)=>card(b.id).introDate>card(a.id).introDate?1:-1), meta:(w)=>`Introduced today · Next review: ${card(w.id).nextReview||'—'}`, right:null, removeBtn:false},
    due:  {label:"Due for Review",  words:()=>dueWords().sort((a,b)=>(card(a.id).nextReview||'')>(card(b.id).nextReview||'')?1:-1), meta:(w)=>`Next review: ${card(w.id).nextReview||'—'}`, right:(w)=>`${card(w.id).interval||1}d interval`, removeBtn:false},
    learned:{label:"All Learned Words", words:()=>withId().filter(w=>card(w.id).introduced).sort((a,b)=>((card(b.id).introDate||'')>(card(a.id).introDate||''))?1:-1), meta:(w)=>`Learned: ${card(w.id).introDate||'—'} · Interval: ${card(w.id).interval||1}d`, right:(w)=>{const c2=card(w.id);return c2.reps>0?`${c2.reps} rep${c2.reps!==1?'s':''}`:null}, removeBtn:false},
    new:  {label:"New Words",       words:()=>newWords(), meta:()=>null, right:null, removeBtn:false},
    difficult:{label:"Difficult Words", words:()=>difficultWords().sort((a,b)=>(card(b.id).lastWrong||'')>(card(a.id).lastWrong||'')?1:-1), meta:(w)=>`Last missed: ${card(w.id).lastWrong||'—'}`, right:null, removeBtn:true},
  }[S.wordlistType]||{label:'Words',words:()=>[],meta:()=>null,right:null,removeBtn:false};

  const words=cfg.words();

  const hdr=div('page-hdr card card-sm');
  hdr.append(
    el('button',{cls:'back',onclick:()=>{S.screen='home';render()}},'←'),
    el('h2',{},cfg.label),
    el('span',{style:'font-size:13px;color:var(--muted);margin-left:auto'},words.length+' words')
  );

  if(!words.length){
    const empty=div('card',el('div',{style:'text-align:center;padding:24px;color:var(--muted)'},'No words here yet.'));
    return nodes(hdr,empty);
  }

  // Group by category
  const groups=new Map();
  for(const w of words){
    if(!groups.has(w.c))groups.set(w.c,[]);
    groups.get(w.c).push(w);
  }

  const sections=[];
  let globalIdx=1;
  for(const[cat,catWords] of groups){
    const section=div('list-card');

    // Category header
    const catHdr=div('');
    catHdr.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:4px';
    catHdr.textContent=cat;
    section.append(catHdr);

    const list=div('word-list');
    for(const w of catWords){
      const item=div('wl-item');
      const idx=div('wl-idx');idx.textContent=globalIdx++;idx.style.color='var(--border)';
      const body=div('wl-body');
      const de=div('wl-de');de.textContent=w.g;
      const en=div('wl-en');en.textContent=w.e;
      body.append(de,en);
      const meta=cfg.meta(w);
      if(meta){const m=div('wl-meta');m.textContent=meta;body.append(m)}
      const eb=el('button',{cls:'edit-wl-btn',type:'button',title:'Edit word',
        onclick:()=>{S.editWordId=w.id;S.screen='editword';render()}});
      eb.textContent='✏';
      item.append(idx,body,speakBtn(w.g),eb);
      const rightText=cfg.right&&cfg.right(w);
      if(rightText){const r=div('wl-right');r.innerHTML=`<span class="wl-interval">${esc(rightText)}</span>`;item.append(r)}
      if(cfg.removeBtn){
        const rb=el('button',{cls:'remove-btn',type:'button',title:'Remove from difficult words',
          onclick:()=>{card(w.id).lastWrong=null;save();S.screen='wordlist';render()}});
        rb.textContent='✕';
        item.append(rb);
      }
      list.append(item);
    }
    section.append(list);
    sections.push(section);
  }

  return nodes(hdr,...sections);
}

// ── Edit Word screen ──────────────────────────────────────────────────────────
function renderEditWord(){
  const id=S.editWordId;
  const isCustom=id>=WORDS.length;
  const xi=isCustom?id-WORDS.length:-1;
  const base=isCustom?((prog._xw&&prog._xw[xi])||{g:'',e:'',c:''}):WORDS[id];
  const ov=(!isCustom&&prog._wo&&prog._wo[id])||{};
  const cur={g:ov.g!=null?ov.g:base.g||'', e:ov.e!=null?ov.e:base.e||'', c:ov.c!=null?ov.c:base.c||''};

  const hdr=div('page-hdr card card-sm');
  hdr.append(
    el('button',{cls:'back',onclick:()=>{S.screen='wordlist';render()}},'←'),
    el('h2',{},'Edit Word'),
    el('span',{style:'font-size:12px;color:var(--muted);margin-left:auto'},isCustom?'Custom':'Built-in')
  );

  const form=div('card');
  const gF=mkFormField('German',  'e.g. das Haus',     cur.g);
  const eF=mkFormField('English', 'e.g. house',        cur.e);
  const cF=mkFormField('Category','e.g. EVERYDAY LIFE',cur.c);

  const saveBtn=btn('btn-primary btn-full','Save Changes',()=>{
    const g=gF.inp.value.trim(),e=eF.inp.value.trim(),c=cF.inp.value.trim();
    if(!g||!e||!c){alert('All three fields are required.');return}
    if(isCustom){
      if(!prog._xw)prog._xw=[];
      prog._xw[xi]={g,e,c};
    }else{
      if(!prog._wo)prog._wo={};
      const orig=WORDS[id],ov2={};
      if(g!==orig.g)ov2.g=g; if(e!==orig.e)ov2.e=e; if(c!==orig.c)ov2.c=c;
      if(Object.keys(ov2).length)prog._wo[id]=ov2; else if(prog._wo)delete prog._wo[id];
    }
    save();S.screen='wordlist';render();
  });
  saveBtn.style.marginTop='4px';

  const delBtn=btn('btn-ghost btn-full',isCustom?'Delete Word':'Hide Word',()=>{
    if(!confirm((isCustom?'Delete':'Hide')+` "${cur.g}"?`))return;
    card(id)._hidden=true; save(); S.screen='wordlist'; render();
  });
  delBtn.style.cssText='margin-top:8px;color:var(--err);border-color:var(--err)';

  form.append(gF.wrap,eF.wrap,cF.wrap,saveBtn,delBtn);

  if(!isCustom){
    const resetBtn=btn('btn-ghost btn-full','↺ Reset to Original',()=>{
      if(prog._wo)delete prog._wo[id];
      if(prog[id])delete prog[id]._hidden;
      save(); S.screen='wordlist'; render();
    });
    resetBtn.style.marginTop='8px';
    form.append(resetBtn);
  }
  return nodes(hdr,form);
}

// ── Word Import screen ────────────────────────────────────────────────────────
function renderWordImport(){
  const hdr=div('page-hdr card card-sm');
  hdr.append(
    el('button',{cls:'back',onclick:goHome},'←'),
    el('h2',{},'Import Words')
  );

  const infoCard=div('card card-sm');
  infoCard.innerHTML=`<p style="font-size:13px;color:var(--muted);line-height:1.7;margin:0">
    One word per line — two or three comma-separated columns:<br>
    <code style="background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--text)">German, English</code>
    &nbsp;or&nbsp;
    <code style="background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--text)">German, English, Category</code><br>
    Quoted fields and commas inside quotes are supported.
  </p>`;

  const form=div('card');
  const catF=mkFormField('Default Category (used when column 3 is absent)','MY WORDS');
  const csvF=mkFormTextarea('CSV Data','das Buch, book, CULTURE\ndie Stadt, city\nanpassen, to adapt / to adjust, VERBS');
  const previewDiv=div('');

  const previewBtn=btn('btn-ghost btn-full','Preview →',()=>{
    const lines=csvF.ta.value.split('\n').map(l=>l.trim()).filter(Boolean);
    const defaultCat=catF.inp.value.trim()||'IMPORTED';
    const parsed=[],errors=[];
    lines.forEach((line,i)=>{
      const cols=parseCSVLine(line);
      if(cols.length<2){errors.push(`Line ${i+1}: need at least two columns`);return}
      const g=cols[0].trim(),e=cols[1].trim(),c=(cols[2]||'').trim()||defaultCat;
      if(!g||!e){errors.push(`Line ${i+1}: empty German or English field`);return}
      parsed.push({g,e,c});
    });
    previewDiv.innerHTML='';
    if(errors.length){
      const ed=div('');
      ed.style.cssText='background:var(--errl);border-radius:8px;padding:12px;margin-top:12px;font-size:13px;color:var(--err);line-height:1.6';
      ed.innerHTML='<strong>Errors:</strong><br>'+errors.map(esc).join('<br>');
      previewDiv.append(ed);
    }
    if(!parsed.length)return;
    const summary=div('');
    summary.style.cssText='font-size:13px;font-weight:600;color:var(--muted);margin:12px 0 4px';
    summary.textContent=`${parsed.length} word${parsed.length!==1?'s':''} ready to import`;
    previewDiv.append(summary);
    const pl=div('list-card');pl.style.marginTop='6px';
    const showing=Math.min(parsed.length,6);
    for(let i=0;i<showing;i++){
      const item=div('wl-item');
      const body=div('wl-body');
      body.append(el('div',{cls:'wl-de'},parsed[i].g));
      body.append(el('div',{cls:'wl-en'},parsed[i].e+' · '+parsed[i].c));
      item.append(el('div',{cls:'wl-idx'},(i+1).toString()),body);
      pl.append(item);
    }
    if(parsed.length>showing){
      const more=div('');more.style.cssText='font-size:12px;color:var(--muted);padding:8px 0 0;text-align:center';
      more.textContent=`…and ${parsed.length-showing} more`;pl.append(more);
    }
    previewDiv.append(pl);
    const confirmBtn=btn('btn-primary btn-full',`Import ${parsed.length} words`,()=>{
      if(!prog._xw)prog._xw=[];
      prog._xw.push(...parsed);
      save();goHome();
    });
    confirmBtn.style.marginTop='12px';
    previewDiv.append(confirmBtn);
  });
  previewBtn.style.marginTop='12px';
  form.append(catF.wrap,csvF.wrap,previewBtn,previewDiv);
  return nodes(hdr,infoCard,form);
}

// ── Sentence Practice screen ──────────────────────────────────────────────────
function renderSentencePractice(){
  const words=S.sentenceWords;
  const idx=S.sentenceIdx;

  // ── Session complete ──
  if(idx>=words.length){
    const c=div('card');
    c.innerHTML=`<div style="text-align:center;margin-bottom:20px">
      <div style="font-size:48px">✍️</div>
      <h2 style="margin-top:10px">Sentence Practice Done!</h2>
      <p style="color:var(--muted);font-size:14px;margin-top:8px">You wrote sentences for ${words.length} word${words.length!==1?'s':''} from this week.</p>
    </div>`;
    c.append(btn('btn-primary btn-full','← Home',goHome));
    return[c];
  }

  const w=words[idx];
  const hdr=div('page-hdr card card-sm');
  hdr.append(
    el('button',{cls:'back',onclick:goHome},'←'),
    el('h2',{},'Sentence Practice'),
    el('span',{style:'font-size:13px;color:var(--muted);margin-left:auto'},(idx+1)+'/'+words.length)
  );
  const pb=div('prog-bar');
  const pf=div('prog-fill');pf.style.width=(idx/words.length*100)+'%';pb.append(pf);

  const c=div('card');
  const badge=div('cat-badge');badge.textContent=w.c;c.append(badge);
  c.append(el('div',{cls:'label'},'Write a German sentence using this word:'));

  const wordBox=div('study-box');
  const deRow=div('study-row');
  deRow.append(el('span',{cls:'study-lang'},'DE'),el('span',{cls:'study-word de'},w.g),speakBtn(w.g));
  const enRow=div('study-row');
  enRow.append(el('span',{cls:'study-lang'},'EN'),el('span',{cls:'study-word'},w.e));
  wordBox.append(deRow,enRow);
  c.append(wordBox);

  const ta=el('textarea',{cls:'sentence-ta',placeholder:'Schreib hier deinen Satz auf Deutsch…'});
  c.append(ta);

  const fb=div('');c.append(fb);

  const submitBtn=btn('btn-primary btn-full','Check →',()=>{
    const sentence=ta.value.trim();
    if(!sentence)return;
    ta.disabled=true;submitBtn.classList.add('hidden');
    logReview(); // counts toward streak

    const found=sentenceContainsWord(sentence,w.g);
    const fbEl=div('feedback '+(found?'fb-ok':'fb-warn'));
    fbEl.innerHTML=found
      ?`✓ "${esc(w.g)}" spotted in your sentence!`
      :`Tip: Try including <strong>${esc(w.g)}</strong> — inflected forms are fine.`;
    fb.append(fbEl);

    const rateLabel=el('div',{style:'font-size:13px;color:var(--muted);margin:14px 0 8px;font-weight:600'},'How was your sentence?');
    const rateRow=div('btn-row');rateRow.style.marginTop='0';
    rateRow.append(
      btn('btn-ghost','↺ Try Again',()=>{
        ta.disabled=false;ta.value='';ta.focus();
        submitBtn.classList.remove('hidden');
        fb.innerHTML='';
      }),
      btn('btn-ok','Good ✓',()=>{S.sentenceIdx++;render()})
    );
    fb.append(rateLabel,rateRow);
  });
  submitBtn.style.marginTop='12px';
  c.append(submitBtn);

  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey&&!ta.disabled)submitBtn.click()});
  setTimeout(()=>ta.focus(),50);
  return nodes(hdr,pb,c);
}

{id:'g11',title:'Passé Composé (Past Tense)',level:'A2',icon:'⏮',
 steps:[
  {type:'text',html:'<h3>Talking About the Past</h3><p>The <em>passé composé</em> is the most common past tense in spoken French. It\'s formed with:</p><p><strong>avoir/être + past participle</strong></p>'},
  {type:'text',html:'<h3>With avoir (most verbs)</h3>'},
  {type:'table',headers:['Infinitive','Past Participle','Example'],rows:[
    ['parler','-er → -é','j\'ai parlé (I spoke)'],['finir','-ir → -i','j\'ai fini (I finished)'],
    ['vendre','-re → -u','j\'ai vendu (I sold)'],['voir','vu','j\'ai vu (I saw)'],
    ['faire','fait','j\'ai fait (I did)'],['prendre','pris','j\'ai pris (I took)'],
  ]},
  {type:'note',html:'<strong>With être (movement/state verbs — "DR MRS VANDERTRAMP"):</strong> aller, venir, partir, arriver, naître, mourir, rester, tomber, entrer, sortir, monter, descendre, retourner, passer, devenir, revenir, and all reflexive verbs.<br>With être, the participle agrees with the subject: <em>Elle est arrivée.</em> <em>Ils sont partis.</em>'},
  {type:'tip',html:'Negation: put ne...pas around the auxiliary: <em>Je n\'ai pas mangé.</em> (I didn\'t eat.) <em>Il n\'est pas venu.</em> (He didn\'t come.)'},
 ],
 quiz:[
  {q:'"I ate" in passé composé is…',opts:['j\'ai mangé','je mangé','j\'ai manger','j\'ai mange'],ans:0},
  {q:'Which auxiliary (avoir/être) is used with "aller"?',opts:['être','avoir','both','neither'],ans:0},
  {q:'"She arrived" with être agreement:',opts:['elle est arrivée','elle a arrivée','elle est arrivé','elle est arriver'],ans:0},
  {q:'"I didn\'t see" in passé composé:',opts:['Je n\'ai pas vu','Je n\'ai pas voir','Je pas ai vu','Je n\'est pas vu'],ans:0},
 ]},

{id:'g12',title:'Useful Phrases & Prepositions',level:'A2',icon:'🗺',
 steps:[
  {type:'text',html:'<h3>Essential Prepositions</h3>'},
  {type:'table',headers:['French','English','Example'],rows:[
    ['à','at / to','à Paris, à la maison'],['de','of / from','de Paris, la maison de Paul'],
    ['en','in / to (countries, fem.)','en France, en voiture'],['au/aux','to/at the (masc./pl.)','au marché, aux États-Unis'],
    ['dans','inside / in','dans la boîte'],['sur','on','sur la table'],
    ['sous','under','sous le lit'],['entre','between','entre les deux'],
    ['devant','in front of','devant la porte'],['derrière','behind','derrière la maison'],
    ['près de','near','près du parc'],['loin de','far from','loin de chez moi'],
  ]},
  {type:'note',html:'<strong>Countries:</strong> Use <em>en</em> for feminine countries (en France, en Espagne) and <em>au</em> for masculine (au Japon, au Canada), <em>aux</em> for plural (aux États-Unis).'},
  {type:'text',html:'<h3>Essential Everyday Phrases</h3>'},
  {type:'table',headers:['French','English'],rows:[
    ['S\'il vous plaît / S\'il te plaît','Please (formal/informal)'],['Merci (beaucoup)','Thank you (very much)'],
    ['De rien / Je vous en prie','You\'re welcome'],['Excusez-moi / Pardon','Excuse me / Sorry'],
    ['Je ne comprends pas.','I don\'t understand.'],['Vous parlez anglais?','Do you speak English?'],
    ['Pouvez-vous répéter?','Can you repeat?'],['C\'est combien?','How much is it?'],
    ['Où sont les toilettes?','Where is the bathroom?'],['Je voudrais…','I would like…'],
  ]},
 ],

 ]},

function frLoad(){
  try{return JSON.parse(localStorage.getItem('french_srs_v1')||'{}')}catch{return{}}
}
function frSave(){localStorage.setItem('french_srs_v1',JSON.stringify(FP))}
let FP=frLoad();

function frCard(id){if(!FP[id])FP[id]={};return FP[id]}
function frGrammarDone(gid){return !!frCard(gid).done}
function frWordIntroduced(id){return !!frCard(id).introduced}
function frTotalIntroduced(){return FR_WORDS.filter(w=>frCard(w.id).introduced).length}
function frDueWords(){
  const t=today();
  return FR_WORDS.filter(w=>{const c=frCard(w.id);return c.introduced&&c.nextReview&&c.nextReview<=t});
}
function frTodayWords(){const t=today();return FR_WORDS.filter(w=>frCard(w.id).introDate===t)}
function frDifficultWords(){
  return FR_WORDS.filter(w=>{const c=frCard(w.id);return c.introduced&&c.lastWrong&&daysSince(c.lastWrong)<=30});
}

function frSM2(c,q){
  // Identical algorithm to German sm2(): Again=0, Hard=1, Good=2, Easy=3
  if(q===0){
    c.reps=0;c.interval=1;c.lastWrong=today();
    c.nextReview=today(); // due again immediately (same-day session or tomorrow)
  } else {
    const qv=q===1?3:q===2?4:5;  // map to SM-2 quality 3/4/5
    c.ef=Math.max(1.3,(c.ef||2.5)+0.1-(5-qv)*(0.08+(5-qv)*0.02));
    if((c.reps||0)===0)c.interval=1;
    else if((c.reps||0)===1)c.interval=6;
    else c.interval=Math.max(1,Math.round((c.interval||1)*(c.ef||2.5)));
    if(q===3)c.interval=Math.round(c.interval*1.3);  // Easy bonus
    c.reps=(c.reps||0)+1;
    c.nextReview=addDays(today(),c.interval||1);
  }
}

// ── French text-check helpers ─────────────────────────────────────────────────
function normFr(s){
  return s.toLowerCase().trim()
    .replace(/[àâä]/g,'a').replace(/[éèêë]/g,'e')
    .replace(/[îï]/g,'i').replace(/[ôö]/g,'o')
    .replace(/[ùûü]/g,'u').replace(/ç/g,'c')
    .replace(/œ/g,'oe').replace(/æ/g,'ae')
    .replace(/\s+/g,' ');
}
function checkFr(input,french){
  const stripArt=s=>s.replace(/^(le |la |l'|les |un |une |des )/i,'').trim();
  const u=normFr(input.trim());
  if(!u)return'wrong';
  const alts=french.split('/').map(a=>a.trim());
  for(const a of alts){
    if(u===normFr(a)||u===normFr(stripArt(a)))return'correct';
  }
  const d=Math.min(...alts.map(a=>Math.min(lev(u,normFr(a)),lev(u,normFr(stripArt(a))))));
  const minLen=Math.min(...alts.map(a=>normFr(stripArt(a)).length));
  if(d<=1&&minLen>3)return'close';
  return'wrong';
}
function speakFr(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='fr-FR';u.rate=0.85;
  window.speechSynthesis.speak(u);
}
function speakBtnFr(text){
  return el('button',{cls:'speak-btn',type:'button',onclick:e=>{e.stopPropagation();speakFr(text)}},'🔊');
}

// ── French type card ──────────────────────────────────────────────────────────
// opts: { onCorrect(quality), onWrong(), trackSRS, retryBanner }
function buildFrTypeCard(w,opts){
  const c=div('fr-card');
  const badge=div('cat-badge');badge.textContent=w.c;c.append(badge);
  if(opts.retryBanner)c.append(el('div',{cls:'feedback fb-info',style:'margin-bottom:12px'},opts.retryBanner));

  c.append(el('div',{cls:'label'},'Translate to French:'));
  c.append(el('div',{cls:'prompt-en'},w.e));

  const inp=el('input',{cls:'word-input',type:'text',placeholder:'Type French here…',
    autocomplete:'off',autocorrect:'off',autocapitalize:'off',spellcheck:'false'});

  // French accent helpers
  const ur=div('umlaut-row');
  for(const ch of['é','è','ê','à','â','ç','î','ô','ù','û','œ','æ']){
    const ub=el('button',{cls:'uml',type:'button',onclick:()=>{
      const pos=inp.selectionStart,v=inp.value;
      inp.value=v.slice(0,pos)+ch+v.slice(pos);
      inp.setSelectionRange(pos+1,pos+1);inp.focus();
    }},ch);
    ur.append(ub);
  }

  const fb=div('feedback hidden');
  const ratingArea=div('hidden');
  const submitBtn=btn('btn-primary','Check →',submit);
  let answered=false;

  function submit(){
    if(answered)return;
    answered=true;
    const result=checkFr(inp.value,w.f);
    inp.disabled=true;submitBtn.classList.add('hidden');
    fb.classList.remove('hidden');

    if(result==='correct'){
      inp.classList.add('input-ok');
      fb.className='feedback fb-ok';
      const ph=el('span',{},'✓ ');const bold=el('strong',{},w.f);const rest=el('span',{},' ');
      fb.append(ph,bold,rest,speakBtnFr(w.f));
      speakFr(w.f);
      FS.stats.correct++;
      ratingArea.classList.remove('hidden');
      if(opts.trackSRS){
        const row=div('rating-row');
        for(const r of [{q:0,cls:'r-bad',l:'Again',s:'Reset'},{q:1,cls:'r-hard',l:'Hard',s:'Short'},{q:2,cls:'r-ok',l:'Good',s:'Normal'},{q:3,cls:'r-easy',l:'Easy',s:'Longer'}]){
          const rb=el('button',{cls:'rbtn '+r.cls,type:'button',onclick:()=>{r.q===0?opts.onWrong():opts.onCorrect(r.q)}});
          rb.innerHTML=`${r.l}<sub>${r.s}</sub>`;row.append(rb);
        }
        ratingArea.append(row);
      } else {
        ratingArea.append(btn('btn-ok btn-full','Continue →',()=>opts.onCorrect(2)));
      }
    } else if(result==='close'){
      opts.markMistake?.();
      inp.classList.add('input-warn');
      fb.className='feedback fb-warn';
      fb.append(el('span',{},'Almost! '),el('strong',{},w.f),' ',speakBtnFr(w.f));
      speakFr(w.f);FS.stats.wrong++;
      ratingArea.classList.remove('hidden');
      const ph=w.p?` [${w.p}]`:'';
      ratingArea.append(el('div',{style:'font-size:13px;color:var(--muted);margin-bottom:8px'},`Pronunciation: ${w.f}${ph}`));
      ratingArea.append(btn('btn-ghost btn-full','Continue →',opts.onWrong));
    } else {
      opts.markMistake?.();
      inp.classList.add('input-err');
      fb.className='feedback fb-err';
      fb.append(el('span',{},'✗ Answer: '),el('strong',{},w.f),' ',speakBtnFr(w.f));
      speakFr(w.f);FS.stats.wrong++;
      ratingArea.classList.remove('hidden');
      const ph=w.p?` [${w.p}]`:'';
      ratingArea.append(el('div',{style:'font-size:13px;color:var(--muted);margin-bottom:8px'},`Pronunciation: ${w.f}${ph}`));
      ratingArea.append(btn('btn-ghost btn-full','Continue →',opts.onWrong));
    }
  }

  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!answered)submit()});
  c.append(inp,ur,submitBtn,fb,ratingArea);
  setTimeout(()=>inp.focus(),50);
  return c;
}

// ── French topic helpers ──────────────────────────────────────────────────────
function frTopics(){
  const map=new Map();
  for(const w of FR_WORDS){if(!map.has(w.c))map.set(w.c,{total:0,done:0});const t=map.get(w.c);t.total++;if(frCard(w.id).introduced)t.done++;}
  return map;
}
function startFrReview(type,topic){
  let words;
  if(type==='topic')      words=shuffle(FR_WORDS.filter(w=>w.c===topic&&frCard(w.id).introduced));
  else if(type==='all')   words=shuffle(FR_WORDS.filter(w=>frCard(w.id).introduced));
  else if(type==='difficult') words=shuffle(frDifficultWords());
  else if(type==='today') words=shuffle(frTodayWords());
  else                    words=shuffle(frDueWords()); // 'due'
  if(!words.length)return;
  Object.assign(FS,{screen:'freview',rtype:type,topicFilter:topic||null,queue:words,qIdx:0,wrongQ:[],retrying:false,stats:{correct:0,wrong:0}});
  frRender();
}

// ── French learn pipeline ─────────────────────────────────────────────────────
function frDistractors(word,n){
  const same=shuffle(FR_WORDS.filter(w=>w.c===word.c&&w.f!==word.f));
  const diff=shuffle(FR_WORDS.filter(w=>w.c!==word.c&&w.f!==word.f));
  const pool=[...same,...diff];
  const seen=new Set([word.f]);const out=[];
  for(const w of pool){if(!seen.has(w.f)){seen.add(w.f);out.push(w.f);if(out.length===n)break}}
  while(out.length<n){const r=FR_WORDS[Math.floor(Math.random()*FR_WORDS.length)];if(!seen.has(r.f)){seen.add(r.f);out.push(r.f)}}
  return out;
}
function getFrNextLearnCard(){
  if(FS.mcQ.length>=3)   return{word:FS.mcQ.shift(),  stage:'mc'};
  if(FS.typeQ.length>=2) return{word:FS.typeQ.shift(), stage:'type'};
  if(FS.studyQ.length>0) return{word:FS.studyQ.shift(),stage:'study'};
  if(FS.mcQ.length>0)    return{word:FS.mcQ.shift(),   stage:'mc'};
  if(FS.typeQ.length>0)  return{word:FS.typeQ.shift(), stage:'type'};
  return null;
}
function advanceFrLearn(onCurrentCard){
  onCurrentCard();
  const next=getFrNextLearnCard();
  if(!next){finishFrLearnSession();return;}
  FS.currentCard=next;
  frRender();
}
function finishFrLearnSession(){
  for(const w of FS.learnBatch){
    const c=frCard(w.id);
    c.introduced=true;c.introDate=today();c.reps=1;c.interval=1;c.nextReview=addDays(today(),1);
  }
  frSave();
  FS.stats.learned=FS.learnBatch.length;
  // Detect newly-completed topic categories
  const batchCats=new Set(FS.learnBatch.map(w=>w.c));
  const completed=[];
  for(const cat of batchCats){
    const all=FR_WORDS.filter(w=>w.c===cat);
    if(all.length>0&&all.every(w=>frCard(w.id).introduced))completed.push(cat);
  }
  FS.completedTopicsQueue=completed;
  FS.screen='fsummary';frRender();
}

function startFrComprehensiveReview(topic){
  const words=shuffle(FR_WORDS.filter(w=>w.c===topic));
  if(!words.length)return;
  Object.assign(FS,{screen:'freview',rtype:'comprehensive',topicFilter:topic,queue:words,qIdx:0,
    wrongQ:[],retrying:false,stats:{correct:0,wrong:0}});
  frRender();
}
function startFrLearn(topic,batch){
  Object.assign(FS,{screen:'flearn',learnTopic:topic,learnBatch:batch,
    studyQ:[...batch],mcQ:[],typeQ:[],learnMastered:[],
    mcOpts:[],mcDone:false,mcOk:null,lastChosen:null,
    stats:{correct:0,wrong:0,learned:0}});
  FS.currentCard=getFrNextLearnCard();
  frRender();
}

  // Actions
  const acts=[];

  // Today's words
  if(todayCount>0){
    const tdBtn=div('action-card');
    tdBtn.innerHTML=`<div class="action-icon ic-green">⭐</div><div class="action-info"><div class="action-title">Today's Practice</div><div class="action-sub">Review the ${todayCount} word${todayCount!==1?'s':''} you learned today</div></div><span class="badge badge-ok">${todayCount}</span>`;
    tdBtn.onclick=()=>startFrReview('today');

  // Grammar lessons
  const grBtn=div('action-card');

  grBtn.onclick=()=>{FS.screen='fgrammar';FS.grammarId=null;frRender()};
  acts.push(grBtn);

  // Learn vocabulary — always finish the current topic before starting the next.
  // Sessions are 20 words; extend up to 25 if it completes the topic.
  const FR_BATCH=20,FR_BATCH_MAX=25;
  // Canonical topic order = order each topic FIRST appears in FR_WORDS.
  // This is stable even when topic-embedded verbs are appended after other topics' words.
  const frCanonicalOrder=[...new Set(FR_WORDS.map(w=>w.c))];
  const unlearnedByTopic=new Map();
  for(const w of FR_WORDS){if(!frCard(w.id).introduced){if(!unlearnedByTopic.has(w.c))unlearnedByTopic.set(w.c,[]);unlearnedByTopic.get(w.c).push(w);}}
  // Pick the earliest-ordered topic that still has ANY unlearned words (including appended verbs)
  const nextTopic=frCanonicalOrder.find(t=>unlearnedByTopic.has(t))||null;

    learnBtn.innerHTML=`<div class="action-icon ic-green">✏️</div><div class="action-info"><div class="action-title">Learn Vocabulary</div><div class="action-sub">All words learned!</div></div>`;

  if(due>0)revBtn.onclick=()=>startFrReview('due');
  acts.push(revBtn);

  // Difficult words
  const diffBtn=div('action-card'+(diff>0?'':' dim'));
  diffBtn.innerHTML=`<div class="action-icon ic-purple">⚠️</div><div class="action-info"><div class="action-title">Difficult Words</div><div class="action-sub">${diff>0?diff+' words you\'ve struggled with':'No difficult words yet'}</div></div>${diff>0?'<span class="badge badge-hard">'+diff+'</span>':''}`;
  if(diff>0)diffBtn.onclick=()=>startFrReview('difficult');
  acts.push(diffBtn);

  // Review by topic
  const topBtn=div('action-card'+(intro>0?'':' dim'));
  topBtn.innerHTML=`<div class="action-icon ic-teal">🗂</div><div class="action-info"><div class="action-title">Review by Topic</div><div class="action-sub">Choose a topic to practise</div></div>`;
  if(intro>0)topBtn.onclick=()=>{FS.screen='ftopics';frRender()};
  acts.push(topBtn);

  // All-words review
  const allBtn=div('action-card'+(intro>0?'':' dim'));
  allBtn.innerHTML=`<div class="action-icon ic-purple">📋</div><div class="action-info"><div class="action-title">Review All Learned Words</div><div class="action-sub">${intro>0?intro+' words':'No words yet'}</div></div>`;
  if(intro>0)allBtn.onclick=()=>startFrReview('all');
  acts.push(allBtn);

  // Word list
  const wlBtn=div('action-card');
  wlBtn.innerHTML=`<div class="action-icon" style="background:#f3d9fa">📖</div><div class="action-info"><div class="action-title">Word List</div><div class="action-sub">Browse all vocabulary by topic</div></div>`;
  wlBtn.onclick=()=>{FS.screen='fwordlist';FS.wordlistTopic=null;frRender()};
  acts.push(wlBtn);

  return nodes(hdr,progCard,...acts);
}

        FS.grammarId=nextLesson.id;FS.grammarStep=0;FS.quizIdx=0;FS.quizAnswered=false;FS.quizChoice=null;frRender();
      });
      nextBtn.style.marginTop='8px';c.append(nextBtn);
    }

  }

  const q=lesson.quiz[FS.quizIdx];
  const c=div('fr-card');
  c.innerHTML=`<div class="label">QUIZ — ${lesson.title}</div><div style="font-size:18px;font-weight:700;margin:12px 0 18px;line-height:1.4">${q.q}</div>`;

  const opts=div('');
  q.opts.forEach((opt,i)=>{
    const isAns=i===q.ans;
    const isChosen=FS.quizAnswered&&FS.quizChoice===i;
    let cls='fr-mc-opt';
    if(FS.quizAnswered){
      cls+=' fr-mc-locked';
      if(isAns)cls+=' fr-mc-correct';
      else if(isChosen)cls+=' fr-mc-wrong';

    const ob=el('button',{cls,type:'button'},opt);
    if(!FS.quizAnswered)ob.addEventListener('click',()=>{FS.quizAnswered=true;FS.quizChoice=i;frRender()});
